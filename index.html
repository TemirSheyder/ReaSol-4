<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Солнечная система — Реальные расстояния + управление скоростью</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            border-radius: 28px;
            color: white;
            font-size: 12px;
            pointer-events: auto;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 160px;
            font-family: monospace;
        }
        
        .controls-row {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        button {
            background: #3a5a3a;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            transition: 0.1s;
        }
        
        button:hover {
            background: #5a7a5a;
            transform: scale(1.02);
        }
        
        .danger-btn {
            background: #aa5533;
        }
        
        .danger-btn:hover {
            background: #cc6644;
        }
        
        .speed-slider {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        input {
            cursor: pointer;
            width: 120px;
        }
        
        .follow-info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            color: #ffdd99;
            font-weight: bold;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            border-bottom: 2px solid #ffaa66;
        }
        
        @media (max-width: 600px) {
            .follow-info { font-size: 10px; top: 12px; left: 12px; }
            .controls { padding: 8px 12px; min-width: 130px; }
            button { font-size: 9px; padding: 3px 8px; }
            .speed-slider { font-size: 10px; }
            input { width: 80px; }
        }
    </style>
</head>
<body>
    <div class="follow-info" id="followPlanetName" style="display: none;">
        🔭 Слежение: <span id="planetNameSpan"></span>
    </div>
    
    <div class="controls">
        <div class="controls-row">
            <button id="toggleLabelsBtn">🏷️ Скрыть подписи</button>
            <button id="toggleOrbitsBtn">🔄 Скрыть орбиты</button>
        </div>
        <div class="controls-row">
            <button id="realDistanceBtn" class="danger-btn">📏 Реальные расстояния</button>
            <button id="normalDistanceBtn">🌍 Демонстрационные расстояния</button>
        </div>
        <div class="controls-row speed-slider">
            <span>⏩ Скорость:</span>
            <input type="range" id="speedSlider" min="0" max="100" step="0.02" value="1">
            <span id="speedValue">1.00</span>
        </div>
        <div class="controls-row">
            <button id="exitFollowBtn" class="danger-btn">🚀 Выйти из слежения</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.007);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 8, 25);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // Постобработка для свечения
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.7;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // CSS2 рендер для подписей
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- Орбит контрол ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // --- Слежение за объектом ---
        let followTarget = null;
        let isFollowing = false;
        
        function setFollowTarget(obj, name) {
            if (followTarget === obj && isFollowing) {
                exitFollowMode();
                return;
            }
            followTarget = obj;
            isFollowing = true;
            controls.enabled = true;
            controls.target.copy(obj.position);
            camera.position.copy(obj.position.clone().add(new THREE.Vector3(3, 1.5, 5)));
            controls.update();
            document.getElementById('followPlanetName').style.display = 'block';
            document.getElementById('planetNameSpan').innerText = name;
            updateMoonsLabelsVisibility(name);
        }
        
        function exitFollowMode() {
            isFollowing = false;
            followTarget = null;
            controls.target.set(0, 0, 0);
            // Не сбрасываем позицию камеры, оставляем где была
            controls.update();
            document.getElementById('followPlanetName').style.display = 'none';
            allMoonLabels.forEach(label => { label.visible = false; });
        }
        
        function updateMoonsLabelsVisibility(planetName) {
            allMoonLabels.forEach(label => {
                label.visible = (label.userData.parentPlanetName === planetName && labelsVisible);
            });
        }
        
        document.getElementById('exitFollowBtn').addEventListener('click', exitFollowMode);
        
        // --- Освещение ---
        const ambientLight = new THREE.AmbientLight(0x222222, 0.4);
        scene.add(ambientLight);
        
        const sunLight = new THREE.PointLight(0xffaa66, 2.5, 500);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        scene.add(sunLight);
        
        const fillLight = new THREE.DirectionalLight(0x88aaff, 0.35);
        fillLight.position.set(1, 2, 1);
        scene.add(fillLight);
        
        // --- СОЛНЦЕ ---
        const sunGeometry = new THREE.SphereGeometry(2.5, 128, 128);
        const sunMaterial = new THREE.MeshStandardMaterial({
            color: 0xffaa55,
            emissive: 0xff4422,
            emissiveIntensity: 1.3,
            metalness: 0.05,
            roughness: 0.3
        });
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        sunMesh.userData = { name: 'Солнце', isSun: true };
        scene.add(sunMesh);
        
        // Солнечная корона
        const coronaGeometry = new THREE.SphereGeometry(2.9, 64, 64);
        const coronaMaterial = new THREE.MeshBasicMaterial({ color: 0xff8844, transparent: true, opacity: 0.12, side: THREE.BackSide });
        const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
        scene.add(corona);
        
        // Частицы вокруг Солнца
        const sunParticlesCount = 800;
        const sunParticlesGeo = new THREE.BufferGeometry();
        const sunParticlesPos = [];
        for (let i = 0; i < sunParticlesCount; i++) {
            const radius = 2.7 + Math.random() * 0.8;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            sunParticlesPos.push(radius * Math.sin(phi) * Math.cos(theta), radius * Math.sin(phi) * Math.sin(theta), radius * Math.cos(phi));
        }
        sunParticlesGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(sunParticlesPos), 3));
        const sunParticlesMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.04, transparent: true, blending: THREE.AdditiveBlending });
        const sunParticles = new THREE.Points(sunParticlesGeo, sunParticlesMat);
        scene.add(sunParticles);
        
        // --- Функция подписей ---
        function makeLabel(text, color, fontSize = '12px', bgOpacity = 0.6) {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = fontSize;
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 0px black';
            div.style.background = `rgba(0,0,0,${bgOpacity})`;
            div.style.padding = '2px 8px';
            div.style.borderRadius = '20px';
            div.style.borderLeft = `3px solid ${color}`;
            div.style.fontFamily = 'monospace';
            div.style.backdropFilter = 'blur(4px)';
            div.style.whiteSpace = 'nowrap';
            return new CSS2DObject(div);
        }
        
        // --- Орбиты ---
        let orbits = [];
        let orbitsVisible = true;
        
        function addOrbit(radius, color = 0x88aacc) {
            const points = [];
            for (let i = 0; i <= 180; i++) {
                const angle = (i / 180) * Math.PI * 2;
                points.push(new THREE.Vector3(radius * Math.cos(angle), 0, radius * Math.sin(angle)));
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const orbit = new THREE.LineLoop(geometry, new THREE.LineBasicMaterial({ color: color }));
            scene.add(orbit);
            orbits.push(orbit);
            return orbit;
        }
        
        function clearOrbits() {
            orbits.forEach(orb => scene.remove(orb));
            orbits = [];
        }
        
        // --- Данные планет (базовые, расстояния будут меняться) ---
        const planetsBaseData = [
            { name: 'Меркурий', radius: 0.32, color: 0xbc9a6c, speed: 0.047, roughness: 0.7, metalness: 0.15, normalDist: 4.5, realDist: 58 },
            { name: 'Венера',   radius: 0.38, color: 0xe6b856, speed: 0.029, roughness: 0.6, metalness: 0.1,  normalDist: 6.2, realDist: 108 },
            { name: 'Земля',    radius: 0.40, color: 0x4c9fff, speed: 0.024, roughness: 0.5, metalness: 0.12, normalDist: 8.0, realDist: 150 },
            { name: 'Марс',     radius: 0.36, color: 0xcc6644, speed: 0.020, roughness: 0.65, metalness: 0.1, normalDist: 9.8, realDist: 228 },
            { name: 'Юпитер',   radius: 0.95, color: 0xd2b48c, speed: 0.013, roughness: 0.55, metalness: 0.2, normalDist: 14.5, realDist: 778 },
            { name: 'Сатурн',   radius: 0.88, color: 0xe8cfaa, speed: 0.010, roughness: 0.5, metalness: 0.22, normalDist: 17.8, realDist: 1427, hasRings: true },
            { name: 'Уран',     radius: 0.68, color: 0xb0e0e6, speed: 0.0075, roughness: 0.4, metalness: 0.25, normalDist: 21.5, realDist: 2871 },
            { name: 'Нептун',   radius: 0.68, color: 0x3b60ff, speed: 0.006, roughness: 0.45, metalness: 0.23, normalDist: 25.0, realDist: 4495 }
        ];
        
        let planets = [];
        let planetLabels = [];
        let currentDistanceMode = 'normal'; // 'normal' or 'real'
        
        function rebuildPlanetsAndOrbits() {
            // Удаляем старые
            planets.forEach(p => scene.remove(p));
            planetLabels.forEach(l => scene.remove(l));
            clearOrbits();
            
            planets = [];
            planetLabels = [];
            
            planetsBaseData.forEach((data, idx) => {
                const dist = currentDistanceMode === 'normal' ? data.normalDist : data.realDist;
                const geometry = new THREE.SphereGeometry(data.radius, 128, 128);
                const material = new THREE.MeshStandardMaterial({
                    color: data.color,
                    roughness: data.roughness,
                    metalness: data.metalness,
                    emissive: data.name === 'Юпитер' ? 0x221100 : 0x000000
                });
                const planet = new THREE.Mesh(geometry, material);
                planet.castShadow = true;
                planet.userData = {
                    distance: dist,
                    speed: data.speed,
                    angle: Math.random() * Math.PI * 2,
                    name: data.name,
                    radius: data.radius,
                    baseSpeed: data.speed
                };
                scene.add(planet);
                
                // Подпись
                const label = makeLabel(data.name, '#ffcc88', '13px', 0.65);
                label.userData = { parentPlanet: planet, offsetY: data.radius + 0.35 };
                scene.add(label);
                planetLabels.push(label);
                
                // Кольца Сатурна
                if (data.hasRings && currentDistanceMode !== 'real') {
                    const ringGeo1 = new THREE.TorusGeometry(data.radius * 1.55, 0.09, 128, 200);
                    const ringMat1 = new THREE.MeshStandardMaterial({ color: 0xcbb58b, metalness: 0.3, roughness: 0.5, transparent: true, opacity: 0.75 });
                    const ring1 = new THREE.Mesh(ringGeo1, ringMat1);
                    ring1.rotation.x = Math.PI / 2.2;
                    planet.add(ring1);
                    
                    const ringGeo2 = new THREE.TorusGeometry(data.radius * 1.85, 0.07, 128, 200);
                    const ringMat2 = new THREE.MeshStandardMaterial({ color: 0xaa9977, metalness: 0.2, transparent: true, opacity: 0.65 });
                    const ring2 = new THREE.Mesh(ringGeo2, ringMat2);
                    ring2.rotation.x = Math.PI / 2.25;
                    planet.add(ring2);
                }
                
                planets.push(planet);
                addOrbit(dist, 0x88aacc);
            });
            
            // Пересоздаём спутники с новыми родителями
            rebuildMoons();
        }
        
        // --- Спутники (будут пересоздаваться при смене расстояний) ---
        let allMoons = [];
        let allMoonLabels = [];
        
        function createMoon(name, parentPlanet, radius, distance, speed, color, angleOffset = 0) {
            const geometry = new THREE.SphereGeometry(radius, 64, 64);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            const moon = new THREE.Mesh(geometry, material);
            scene.add(moon);
            
            const label = makeLabel(name, '#aaffcc', '10px', 0.5);
            label.visible = false;
            label.userData = { parentPlanetName: parentPlanet.userData.name, moonObj: moon };
            scene.add(label);
            allMoonLabels.push(label);
            
            return { obj: moon, parent: parentPlanet, distance: distance, speed: speed, angle: angleOffset, label: label };
        }
        
        function rebuildMoons() {
            allMoons.forEach(m => scene.remove(m.obj));
            allMoonLabels.forEach(l => scene.remove(l));
            allMoons = [];
            allMoonLabels = [];
            
            const earthRef = planets.find(p => p.userData.name === 'Земля');
            const marsRef = planets.find(p => p.userData.name === 'Марс');
            const jupiterRef = planets.find(p => p.userData.name === 'Юпитер');
            const saturnRef = planets.find(p => p.userData.name === 'Сатурн');
            
            if (earthRef) allMoons.push(createMoon('🌙 Луна', earthRef, 0.11, 0.95, 0.14, 0xccccaa));
            if (marsRef) {
                allMoons.push(createMoon('🪨 Фобос', marsRef, 0.08, 0.68, 0.22, 0xaa8866));
                allMoons.push(createMoon('🪨 Деймос', marsRef, 0.07, 0.98, 0.17, 0x997755, 1.5));
            }
            if (jupiterRef) {
                allMoons.push(createMoon('🌋 Ио', jupiterRef, 0.16, 1.35, 0.11, 0xdd8844));
                allMoons.push(createMoon('❄️ Европа', jupiterRef, 0.15, 1.68, 0.095, 0xccaa88, 1.2));
                allMoons.push(createMoon('🌑 Ганимед', jupiterRef, 0.18, 2.05, 0.078, 0xbbaa99, 2.1));
                allMoons.push(createMoon('🌑 Каллисто', jupiterRef, 0.17, 2.48, 0.064, 0xaa9988, 3.0));
            }
            if (saturnRef) {
                allMoons.push(createMoon('🌕 Титан', saturnRef, 0.19, 1.95, 0.068, 0xccaa77));
                allMoons.push(createMoon('🪨 Рея', saturnRef, 0.12, 1.45, 0.085, 0xaa9977, 1.8));
                allMoons.push(createMoon('🪨 Диона', saturnRef, 0.11, 1.25, 0.095, 0xbbaa88, 2.5));
            }
        }
        
        // --- Звёздный фон ---
        const starField = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 }));
        const starPos = [];
        for (let i = 0; i < 3000; i++) {
            starPos.push((Math.random() - 0.5) * 450, (Math.random() - 0.5) * 250, (Math.random() - 0.5) * 180 - 70);
        }
        starField.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        scene.add(starField);
        
        // Астероидный пояс
        const asteroidField = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ color: 0xaa9977, size: 0.05 }));
        const astPos = [];
        for (let i = 0; i < 2200; i++) {
            const r = 12.5 + Math.random() * 1.8;
            const ang = Math.random() * Math.PI * 2;
            astPos.push(Math.cos(ang) * r, (Math.random() - 0.5) * 0.9, Math.sin(ang) * r);
        }
        asteroidField.geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(astPos), 3));
        scene.add(asteroidField);
        
        // --- Скорость времени ---
        let timeSpeed = 1;
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        speedSlider.addEventListener('input', (e) => {
            timeSpeed = parseFloat(e.target.value);
            speedValue.innerText = timeSpeed.toFixed(2);
        });
        
        // --- Управление видимостью ---
        let labelsVisible = true;
        document.getElementById('toggleLabelsBtn').addEventListener('click', () => {
            labelsVisible = !labelsVisible;
            planetLabels.forEach(l => l.visible = labelsVisible);
            if (!isFollowing) allMoonLabels.forEach(l => l.visible = false);
            else if (isFollowing && followTarget) updateMoonsLabelsVisibility(followTarget.userData.name);
            document.getElementById('toggleLabelsBtn').innerText = labelsVisible ? '🏷️ Скрыть подписи' : '🏷️ Показать подписи';
        });
        
        document.getElementById('toggleOrbitsBtn').addEventListener('click', () => {
            orbitsVisible = !orbitsVisible;
            orbits.forEach(orb => orb.visible = orbitsVisible);
            document.getElementById('toggleOrbitsBtn').innerText = orbitsVisible ? '🔄 Скрыть орбиты' : '🔄 Показать орбиты';
        });
        
        document.getElementById('realDistanceBtn').addEventListener('click', () => {
            currentDistanceMode = 'real';
            rebuildPlanetsAndOrbits();
            exitFollowMode();
            // Перенастраиваем камеру, чтобы видеть далёкие планеты
            camera.position.set(0, 50, 300);
            controls.target.set(0, 0, 0);
            controls.update();
        });
        
        document.getElementById('normalDistanceBtn').addEventListener('click', () => {
            currentDistanceMode = 'normal';
            rebuildPlanetsAndOrbits();
            exitFollowMode();
            camera.position.set(0, 8, 25);
            controls.target.set(0, 0, 0);
            controls.update();
        });
        
        // --- Райкастинг ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function onClickObject(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            let cx, cy;
            if (event.touches) { cx = event.touches[0].clientX; cy = event.touches[0].clientY; event.preventDefault(); }
            else { cx = event.clientX; cy = event.clientY; }
            mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const allObjects = [...planets, sunMesh];
            const intersects = raycaster.intersectObjects(allObjects);
            if (intersects.length) {
                const hit = intersects[0].object;
                if (hit === sunMesh) setFollowTarget(sunMesh, 'Солнце');
                else setFollowTarget(hit, hit.userData.name);
            } else if (!isFollowing) {
                // Ничего не делаем, камера остаётся свободной
            }
        }
        
        renderer.domElement.addEventListener('click', onClickObject);
        renderer.domElement.addEventListener('touchstart', onClickObject);
        
        // --- Анимация ---
        let lastTime = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            const deltaSpeed = timeSpeed * 0.016;
            
            // Движение планет
            planets.forEach(planet => {
                const d = planet.userData;
                d.angle += d.speed * deltaSpeed * 0.6;
                const x = Math.cos(d.angle) * d.distance;
                const z = Math.sin(d.angle) * d.distance;
                planet.position.set(x, Math.sin(d.angle * 2) * 0.05, z);
            });
            
            // Спутники
            allMoons.forEach(m => {
                if (!m.parent) return;
                m.angle += m.speed * deltaSpeed * 0.7;
                const px = m.parent.position.x;
                const pz = m.parent.position.z;
                m.obj.position.set(px + Math.cos(m.angle) * m.distance, Math.sin(m.angle * 1.5) * 0.08, pz + Math.sin(m.angle) * m.distance);
                if (m.label && m.label.visible) {
                    m.label.position.copy(m.obj.position);
                    m.label.position.y += 0.12;
                }
            });
            
            // Обновление подписей планет
            planetLabels.forEach(label => {
                if (label.userData.parentPlanet) {
                    label.position.copy(label.userData.parentPlanet.position);
                    label.position.y += label.userData.offsetY;
                }
            });
            
            // Слежение
            if (isFollowing && followTarget) {
                controls.target.copy(followTarget.position);
                controls.update();
            }
            
            // Эффекты Солнца
            sunMesh.rotation.y += 0.002;
            corona.rotation.y += 0.001;
            sunParticles.rotation.y += 0.005;
            sunLight.intensity = 2.3 + Math.sin(Date.now() * 0.003) * 0.2;
            
            starField.rotation.y += 0.00015;
            asteroidField.rotation.y += 0.0008;
            
            effectComposer.render();
            labelRenderer.render(scene, camera);
        }
        
        rebuildPlanetsAndOrbits();
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('✅ Солнечная система с реальными расстояниями и управлением скоростью запущена!');
    </script>
